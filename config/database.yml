default: &default
  adapter: postgresql
  encoding: unicode
  pool: 12

development:
  <<: *default
  database: content_publisher_development
  url: <%= ENV["DATABASE_URL"]%>

test:
  <<: *default
  database: content_publisher_test
  url: <%= ENV["TEST_DATABASE_URL"] %>

production:
  <<: *default
  database: content_publisher
  url: <%= ENV["DATABASE_URL"]%>
